# サイト基本設定
title: "クレジットカード比較ナビ"
description: "クレジットカードの比較・おすすめ情報を徹底解説。年会費・ポイント還元率・審査情報など初心者にもわかりやすく紹介します。"
url: "https://uzoske1304.github.io"
baseurl: ""

# 著者情報
author: "カード比較ナビ編集部"

# テーマ設定（Minima：シンプルで読みやすいテーマ）
theme: minima

# プラグイン
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO設定
lang: ja
timezone: Asia/Tokyo

# パーマリンク設定（URLの形式）
permalink: /:year/:month/:day/:title/

# 除外ファイル
exclude:
  - scripts/
  - README.md
  - Gemfile
  - Gemfile.lock
  - .github/

# 全記事を表示（日付制限を解除）
future: true

# 1ページの表示件数
paginate: 10

# Google Analytics（取得後に設定）
# google_analytics: UA-XXXXXXXXX-X
